  workflow_dispatch:
  

#jobs
#should  be inside the workflow should do , there cab be one or more one jobs , hence we write jobs
# jobs is an object so needs indentation
jobs:
  # first job [give indenation]
  say-hello:
    # create an ephermal container with ubuntu running
    runs-on: ubuntu-latest
    # That ephermal container will have steps to execute, hence name those step .
    steps:
     - name: " Say hello to  everyone
       run: echo "hello DOSTO"
       

